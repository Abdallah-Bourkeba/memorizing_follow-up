<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة الحفظ</title>
    <style>
        :root {
            --primary-color: #2E7D32; /* أخضر غامق */
            --secondary-color: #E8F5E9; /* أخضر فاتح جداً للبطاقات */
            --text-color: #333;
            --bg-color: #F9F9F9; /* خلفية أفتح */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px; /* تقليل البادينغ العام للموبايل */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 15px;
            font-size: 2em;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
        }
        .container {
            width: 100%;
            max-width: 500px; /* تضييق العرض قليلاً */
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 15px; /* تقليل البادينغ */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            border-top: 5px solid var(--primary-color);
        }
        .card h2 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 1.3em;
            margin-bottom: 10px;
        }
        
        /* تصميم بطاقات عرض البيانات للموبايل */
        .user-data-card {
            background-color: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .user-data-header {
            background-color: var(--secondary-color);
            color: var(--primary-color);
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .user-data-header span.label {
            font-size: 0.9em;
        }
        .user-item {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 5px;
            border-bottom: 1px solid #f1f1f1;
            padding-bottom: 3px;
        }
        .user-item .label {
            font-weight: bold;
            color: #666;
            width: 80px; /* عرض ثابت للعنوان */
        }
        .user-item .value {
            color: #333;
            flex: 1;
            text-align: right;
        }
        .user-item.last {
            border-bottom: none;
            margin-bottom: 0;
        }

        /* تصميم نموذج الإدخال */
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 0.9em;
        }
        select, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            box-sizing: border-box;
            font-family: inherit;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(46, 125, 50, 0.3);
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 15px;
            width: 100%;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        button:hover {
            background-color: #1b5e20;
        }
        .loader {
            text-align: center;
            color: #666;
            font-style: italic;
            font-size: 0.9em;
        }
        #message {
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <h1>متابعة الحفظ</h1>

    <div class="container">
        <div class="card">
            <h2>أحدث تسجيل</h2>
            <div id="display-section">
                <p class="loader">جاري جلب البيانات...</p>
            </div>
        </div>

        <div class="card">
            <h2>تسجيل ورد جديد</h2>
            <form id="record-form">
                <div class="form-group">
                    <label for="name">الاسم:</label>
                    <select id="name" name="name" required>
                        <option value="" disabled selected>اختر الاسم</option>
                        <option value="عبدالله محمد">عبدالله محمد</option>
                        <option value="عبدالرحمن وائل">عبدالرحمن وائل</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="surah">اسم السورة:</label>
                    <input type="text" id="surah" name="surah" placeholder="مثال: البقرة" required>
                </div>
                <div class="form-group">
                    <label for="ayah">رقم الآية:</label>
                    <input type="number" id="ayah" name="ayah" placeholder="مثال: 286" min="1" required>
                </div>
            <button type="submit" id="submit-btn">إرسال</button>
                <div id="message"></div>
            </form>
        </div>
    </div>
    <script>
        // *** ضع رابط الـ Web App الخاص بك هنا ***
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzai-5Vi72tDGwIOHPiCp9UZm7gewf4MiZRc11mQxaxLKLj6lqJ34IMuPce81g2yP-Y/exec'; 

        // دالة جديدة لتنسيق التاريخ والوقت
        function formatDateTime(dateString) {
            const d = new Date(dateString);
            if (isNaN(d)) return dateString; 
            
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            
            let hours = d.getHours();
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'م' : 'ص';
            
            hours = hours % 12;
            hours = hours ? hours : 12; 
            
            return `<span dir="ltr">${year}-${month}-${day}</span> | ${hours}:${minutes} ${ampm}`;
        }

        // دالة لعرض بيانات مستخدم في بطاقة
        function createUserCard(userName, userData) {
            if (!userData) {
                return `
                    <div class="user-data-card">
                        <div class="user-data-header">${userName}</div>
                        <p style="text-align:center; color:#888; margin:10px 0;">لا توجد بيانات مسجلة.</p>
                    </div>
                `;
            }

            // تطبيق التنسيق على التاريخ هنا
            const prettyDate = formatDateTime(userData.date);

            return `
                <div class="user-data-card">
                    <div class="user-data-header">${userData.name}</div>
                    <div class="user-item">
                        <span class="label">التاريخ:</span>
                        <span class="value">${prettyDate}</span>
                    </div>
                    <div class="user-item">
                        <span class="label">السورة:</span>
                        <span class="value">${userData.surah}</span>
                    </div>
                    <div class="user-item last">
                        <span class="label">الآية:</span>
                        <span class="value">${userData.ayah}</span>
                    </div>
                </div>
            `;
        }

        // دالة لجلب آخر تسجيل لكل طالب
        async function fetchLastRecords() {
            const displaySection = document.getElementById('display-section');
            if (SCRIPT_URL === 'ضع_الرابط_هنا') {
                displaySection.innerHTML = '<p style="color:red; text-align:center;">يرجى وضع رابط Google Apps Script في الكود أولاً.</p>';
                return;
            }

            try {
                const response = await fetch(SCRIPT_URL + "?action=getLastByStudent");
                const result = await response.json();

                if(result.status === "success") {
                    let htmlContent = '';
                    htmlContent += createUserCard("عبدالله محمد", result.data.abdullah);
                    htmlContent += createUserCard("عبدالرحمن وائل", result.data.abdulrahman);
                    displaySection.innerHTML = htmlContent;
                } else {
                    displaySection.innerHTML = '<p style="text-align:center;">لا توجد بيانات مسجلة حتى الآن.</p>';
                }
            } catch (error) {
                displaySection.innerHTML = '<p style="color:red; text-align:center;">حدث خطأ في جلب البيانات.</p>';
                console.error('Error:', error);
            }
        }

        // إرسال البيانات
        document.getElementById('record-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('message');
            
            btn.disabled = true;
            btn.innerText = 'جاري الإرسال...';
            msg.innerText = '';

            const formData = new FormData();
            formData.append('action', 'add');
            formData.append('name', document.getElementById('name').value);
            formData.append('surah', document.getElementById('surah').value);
            formData.append('ayah', document.getElementById('ayah').value);

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if(result.status === "success") {
                    msg.style.color = "green";
                    msg.innerText = "تم تسجيل البيانات بنجاح!";
                    document.getElementById('record-form').reset();
                    fetchLastRecords();
                } else {
                    throw new Error("فشل الحفظ");
                }
            } catch (error) {
                msg.style.color = "red";
                msg.innerText = "حدث خطأ أثناء الإرسال. تأكد من الاتصال بالإنترنت.";
                console.error('Error!', error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'إرسال';
            }
        });

        // تشغيل دالة الجلب عند فتح الصفحة
        fetchLastRecords();
    </script>
    
</body>
</html>
