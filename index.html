<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متابعة الحفظ المتقدمة</title>
  <style>
    :root {
      --primary-color: #2E7D32;
      --secondary-color: #E8F5E9;
      --bg-color: #F4F7F6;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: var(--primary-color);
      font-size: 1.8em;
      border-bottom: 3px solid var(--primary-color);
      padding-bottom: 5px;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      margin-bottom: 15px;
      border-top: 5px solid var(--primary-color);
    }

    .card h2 {
      margin: 0 0 15px 0;
      color: var(--primary-color);
      font-size: 1.3em;
      text-align: center;
    }

    /* تصميم عرض الحالات المختلفة لكل طالب */
    .student-block {
      margin-bottom: 20px;
      border: 1px solid #eee;
      border-radius: 10px;
      overflow: hidden;
    }

    .student-name-header {
      background: var(--primary-color);
      color: white;
      padding: 8px;
      text-align: center;
      font-weight: bold;
    }

    .type-row {
      padding: 10px;
      border-bottom: 1px solid #f0f0f0;
      background: white;
    }

    .type-row:last-child {
      border-bottom: none;
    }

    .type-label {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.85em;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .label-hifz {
      background: #E3F2FD;
      color: #1565C0;
    }

    .label-review {
      background: #FFF3E0;
      color: #E65100;
    }

    .label-weekly {
      background: #F3E5F5;
      color: #7B1FA2;
    }

    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      font-size: 0.9em;
      color: #555;
    }

    .data-date {
      grid-column: span 2;
      font-size: 0.8em;
      color: #999;
      border-bottom: 1px dashed #eee;
      padding-bottom: 3px;
      margin-bottom: 3px;
    }

    /* النموذج */
    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 0.9em;
    }

    select,
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-family: inherit;
    }

    button {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 6px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
    }

    #message {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>متابعة الحفظ</h1>

  <div class="container">
    <div class="card">
      <h2>أحدث الإنجازات</h2>
      <div id="display-section">
        <p style="text-align:center;">جاري التحميل...</p>
      </div>
    </div>

    <div class="card">
      <h2>تسجيل جديد</h2>
      <form id="record-form">
        <div class="form-group">
          <label>الاسم:</label>
          <select id="name" required>
            <option value="" disabled selected>اختر الاسم</option>
            <option value="عبدالله محمد">عبدالله محمد</option>
            <option value="عبدالرحمن وائل">عبدالرحمن وائل</option>
          </select>
        </div>
        <div class="form-group">
          <label>نوع الورد:</label>
          <select id="type" required>
            <option value="حفظ جديد">حفظ جديد</option>
            <option value="مراجعة ماضي">مراجعة ماضي</option>
            <option value="مراجعة أسبوعية">مراجعة أسبوعية</option>
          </select>
        </div>
        <div class="form-group">
          <label>اسم السورة:</label>
          <input type="text" id="surah" placeholder="مثال: البقرة" required>
        </div>
        <div class="form-group">
          <label>رقم الآية:</label>
          <input type="number" id="ayah" placeholder="آخر آية وصلتها" required>
        </div>
        <button type="submit" id="submit-btn">إرسال البيانات</button>
        <div id="message"></div>
      </form>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxihCF8vLMIvVqSZSpsCLM1M6Uf8rkG4POcXDHH_sQjGl31DDqkAhWGHVPV43RKDwM/exec';

    function formatDateTime(dateString) {
      const d = new Date(dateString);
      if (isNaN(d)) return "---";
      const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
      const ampm = d.getHours() >= 12 ? 'م' : 'ص';
      let h = d.getHours() % 12 || 12;
      return `${days[d.getDay()]} | ${d.toLocaleDateString('en-GB')} | ${h}:${String(d.getMinutes()).padStart(2, '0')} ${ampm}`;
    }

    function createTypeRow(label, data, colorClass) {
      return `
                <div class="type-row">
                    <span class="type-label ${colorClass}">${label}</span>
                    ${data ? `
                        <div class="data-date">${formatDateTime(data.date)}</div>
                        <div class="data-grid">
                            <span><b>السورة:</b> ${data.surah}</span>
                            <span><b>الآية:</b> ${data.ayah}</span>
                        </div>
                    ` : `<div style="color:#ccc; font-size:0.8em;">لا توجد بيانات</div>`}
                </div>`;
    }

    async function fetchLastRecords() {
      try {
        const response = await fetch(SCRIPT_URL + "?action=getLastByStudent");
        const res = await response.json();
        if (res.status === "success") {
          let html = '';
          const students = { "عبدالله محمد": res.data.abdullah, "عبدالرحمن وائل": res.data.abdulrahman };

          for (let name in students) {
            html += `<div class="student-block">
                            <div class="student-name-header">${name}</div>
                            ${createTypeRow("حفظ جديد", students[name]["حفظ جديد"], "label-hifz")}
                            ${createTypeRow("مراجعة ماضي", students[name]["مراجعة ماضي"], "label-review")}
                            ${createTypeRow("مراجعة أسبوعية", students[name]["مراجعة أسبوعية"], "label-weekly")}
                        </div>`;
          }
          document.getElementById('display-section').innerHTML = html;
        }
      } catch (e) { document.getElementById('display-section').innerHTML = "خطأ في الاتصال"; }
    }

    document.getElementById('record-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.innerText = "جاري الحفظ...";

      const formData = new FormData();
      formData.append('name', document.getElementById('name').value);
      formData.append('type', document.getElementById('type').value);
      formData.append('surah', document.getElementById('surah').value);
      formData.append('ayah', document.getElementById('ayah').value);

      try {
        const r = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
        const res = await r.json();
        if (res.status === "success") {
          document.getElementById('message').innerHTML = "✅ تم الحفظ";
          document.getElementById('record-form').reset();
          fetchLastRecords();
        }
      } catch (e) { document.getElementById('message').innerText = "❌ فشل الاتصال"; }
      btn.disabled = false; btn.innerText = "إرسال البيانات";
    });

    fetchLastRecords();
  </script>
</body>

</html>
